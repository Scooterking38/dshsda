name: Dominion AI Training and Battle

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-battle:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gymnasium numpy torch stable-baselines3 shimmy

    - name: Train and Run Tournament
      run: |
        # This will execute the main block: train then play 3 games
        python dominion_env.py
      
    - name: Archive Model
      uses: actions/upload-artifact@v4
      with:
        name: dominion-ai-model
        path: dominion_model.zip
