name: Dominion AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gymnasium numpy torch stable-baselines3 shimmy

    - name: Run Training
      run: |
        python main.py

    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: dominion-model
        path: dominion_selfplay_ai.zip
